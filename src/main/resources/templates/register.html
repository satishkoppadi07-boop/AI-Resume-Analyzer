<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Resume Analyzer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:url('https://images.unsplash.com/photo-1516321318423-f06f85e5') no-repeat center center;
            background-size:cover;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:380px;
            background:rgba(255,255,255,0.95);
            padding:35px;
            border-radius:12px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#2d0aa8;
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:6px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#2d0aa8;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d0680;
        }

        .login-link{
            text-align:center;
            margin-top:18px;
        }

        .login-link a{
            text-decoration:none;
            color:#2d0aa8;
            font-weight:bold;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>User Registration</h2>

    <form action="/register" method="post">

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Register</button>

    </form>
    <p style="color:red;" th:text="${error}"></p>
    <p style="color:green;" th:text="${success}"></p>

    <div class="login-link">
        <a href="/login">Already have an account? Login</a>
    </div>

</div>

</body>
</html>
